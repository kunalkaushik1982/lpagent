<!-- Purpose: Landing page and Login/Registration. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Plan Agent - Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>🎓 Learning Plan Agent</h1>
        <p>Generate your personalized learning path to achieve your career goals.</p>
        
        <div id="alertContainer"></div>
        
        <!-- Login Form -->
        <form id="loginForm" class="auth-form">
            <div class="form-group">
                <label for="loginUsername">Username</label>
                <input type="text" id="loginUsername" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" required autocomplete="current-password">
            </div>
            <button type="submit" id="loginBtn">Login</button>
        </form>
        
        <p style="text-align: center; margin-top: 20px; color: #6b7280;">
            Don't have an account? <a href="#" id="showRegister" style="color: #4f46e5; text-decoration: none; font-weight: 500;">Register here</a>
        </p>
        
        <!-- Registration Form (Hidden by default) -->
        <form id="registerForm" class="auth-form hidden">
            <div class="form-group">
                <label for="regUsername">Username</label>
                <input type="text" id="regUsername" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" required autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="currentRole">Current Role</label>
                <input type="text" id="currentRole" placeholder="e.g., Software Developer">
            </div>
            <div class="form-group">
                <label for="targetRole">Target Role</label>
                <input type="text" id="targetRole" placeholder="e.g., Machine Learning Engineer" required>
            </div>
            <div class="form-group">
                <label for="experience">Years of Experience</label>
                <input type="number" id="experience" min="0" max="50" value="0">
            </div>
            <button type="submit" id="registerBtn">Create Account</button>
        </form>
        
        <p style="text-align: center; margin-top: 20px; color: #6b7280;" id="backToLogin" class="hidden">
            Already have an account? <a href="#" id="showLogin" style="color: #4f46e5; text-decoration: none; font-weight: 500;">Login here</a>
        </p>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
